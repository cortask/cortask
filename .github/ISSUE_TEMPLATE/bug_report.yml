name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Desktop app (Windows)
        - Desktop app (macOS)
        - Desktop app (Linux)
        - Docker
        - npm / npx
        - Install script (Mac/Linux)
        - Install script (Windows)
        - From source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run `cortask --version` or check Settings"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      description: Which provider were you using when this happened?
      options:
        - Anthropic
        - OpenAI
        - Google Gemini
        - Ollama
        - OpenRouter
        - Grok
        - Other
        - N/A

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant error messages or screenshots
