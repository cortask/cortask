name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const dirs = ['packages/core', 'packages/channels', 'packages/gateway', 'packages/cli', 'packages/ui', 'packages/desktop'];
            for (const dir of dirs) {
              const p = dir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
            console.log('All packages set to ' + version);
          " "$VERSION"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Rebuild better-sqlite3 for Electron
        run: pnpm -F @cortask/desktop rebuild

      - name: Package desktop app
        shell: bash
        run: |
          # Skip macOS code signing & notarization when credentials are not configured
          if [[ "${{ matrix.platform }}" == "mac" && -z "$CSC_LINK" ]]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            pnpm -F @cortask/desktop package -- -c.mac.notarize=false
          else
            pnpm -F @cortask/desktop package
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.dmg
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.rpm
          if-no-files-found: warn

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/cortask/cortask:latest
            ghcr.io/cortask/cortask:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const dirs = ['packages/core', 'packages/channels', 'packages/gateway', 'packages/cli'];
            for (const dir of dirs) {
              const p = dir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.name + ' → ' + version);
            }
          " "$VERSION"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: |
          pnpm -F @cortask/core build
          pnpm -F @cortask/channels build
          pnpm -F @cortask/gateway build
          pnpm -F cortask build

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  sign-windows:
    needs: [build]
    runs-on: windows-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: unsigned

      - name: Azure login
        if: secrets.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Azure Trusted Signing
        if: secrets.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: unsigned
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win-signed
          path: unsigned/*.exe

  release:
    needs: [build, docker, sign-windows]
    if: always() && needs.build.result == 'success' && needs.docker.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download signed Windows exe
        id: download-signed
        uses: actions/download-artifact@v4
        with:
          name: desktop-win-signed
          path: artifacts
        continue-on-error: true

      - name: Download unsigned Windows exe (fallback)
        if: steps.download-signed.outcome != 'success'
        uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: artifacts

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
