appId: com.cortask.app
productName: Cortask
copyright: Copyright © 2025 Cortask
directories:
    output: release
files:
    - dist/**/*
    - package.json
    - "!node_modules/@cortask/**"
extraResources:
    - from: ../ui/dist
      to: ui
    - from: ../../skills
      to: skills
    - from: build/icon.png
      to: icon.png
    - from: build/agent-browser-bin
      to: agent-browser
publish:
    provider: github
    owner: cortask
    repo: cortask
win:
    target: nsis
    icon: build/icon.ico
    publisherName: Sebastian Kraus
    azureSignOptions:
        endpoint: https://weu.codesigning.azure.net/
        certificateProfileName: cortask
        codeSigningAccountName: Cortask
mac:
    target: dmg
    icon: build/icon.icns
    category: public.app-category.developer-tools
    hardenedRuntime: true
    gatekeeperAssess: false
    entitlements: build/entitlements.mac.plist
    entitlementsInherit: build/entitlements.mac.plist
    notarize: true
linux:
    target:
        - AppImage
        - deb
        - rpm
    icon: build/icon.png
    category: Development
nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true
artifactName: "${productName}-${version}-${arch}.${ext}"
npmRebuild: false
buildDependenciesFromSource: false
